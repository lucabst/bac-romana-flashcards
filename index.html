<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcarduri Bac Română</title>
  <style>
    :root {
      --green: #2d5a3d;
      --green-dark: #21452f;
      --paper: #ffffff;
      --background: #f7f5f2;
      --line: #d9d5ce;
      --text: #1f2a24;
      --muted: #6c756e;
      --shadow: 0 18px 45px rgba(45, 90, 61, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background: var(--background);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      border-bottom: 2px solid rgba(45, 90, 61, 0.16);
      padding-bottom: 18px;
    }

    .title {
      margin: 0;
      color: var(--green);
      font-size: clamp(28px, 5vw, 43px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .counter {
      flex: 0 0 auto;
      color: var(--green);
      background: var(--paper);
      border: 1px solid rgba(45, 90, 61, 0.2);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      box-shadow: 0 6px 18px rgba(45, 90, 61, 0.08);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .tab-button {
      min-height: 48px;
      border: 1px solid rgba(45, 90, 61, 0.22);
      border-radius: 8px;
      background: var(--paper);
      color: var(--green);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .tab-button:hover,
    .tab-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .tab-button.active {
      background: var(--green);
      color: #ffffff;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .question-card {
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      border: 1px solid rgba(45, 90, 61, 0.16);
      border-radius: 8px;
      padding: clamp(26px, 5vw, 54px);
      box-shadow: var(--shadow);
    }

    .question-text {
      width: 100%;
      margin: 0;
      color: var(--text);
      font-size: clamp(19px, 2.4vw, 20px);
      line-height: 1.55;
      text-align: center;
    }

    .answer-button,
    .random-button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: var(--green);
      color: #ffffff;
      transition: background 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .answer-button {
      min-height: 52px;
      margin-top: 16px;
      font-size: 18px;
      box-shadow: 0 12px 26px rgba(45, 90, 61, 0.16);
    }

    .random-button {
      min-height: 78px;
      margin-top: 18px;
      font-size: 34px;
      line-height: 1;
      box-shadow: 0 15px 34px rgba(45, 90, 61, 0.2);
    }

    .answer-button:hover,
    .answer-button:focus-visible,
    .random-button:hover,
    .random-button:focus-visible {
      background: var(--green-dark);
      transform: translateY(-1px);
      outline: none;
    }

    .gallery {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .gallery.visible {
      display: grid;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      background: #efece7;
      border: 1px solid var(--line);
      box-shadow: 0 10px 26px rgba(31, 42, 36, 0.1);
    }

    .works-list {
      display: grid;
      gap: 10px;
    }

    .work-block {
      background: var(--paper);
      border: 1px solid rgba(45, 90, 61, 0.16);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(45, 90, 61, 0.08);
    }

    .work-button {
      width: 100%;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 0;
      background: var(--paper);
      color: var(--green);
      cursor: pointer;
      text-align: left;
      font-size: 18px;
    }

    .work-button:hover,
    .work-button:focus-visible {
      background: rgba(45, 90, 61, 0.07);
      outline: none;
    }

    .work-button::after {
      content: "+";
      flex: 0 0 auto;
      font-size: 22px;
      color: var(--green);
    }

    .work-block.open .work-button::after {
      content: "-";
    }

    .question-list {
      display: none;
      margin: 0;
      padding: 0 14px 14px;
      list-style: none;
      border-top: 1px solid rgba(45, 90, 61, 0.12);
    }

    .work-block.open .question-list {
      display: grid;
      gap: 8px;
      padding-top: 12px;
    }

    .question-link {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf8;
      color: var(--text);
      cursor: pointer;
      padding: 11px 13px;
      text-align: left;
      line-height: 1.35;
      font-size: 16px;
    }

    .question-link:hover,
    .question-link:focus-visible {
      border-color: rgba(45, 90, 61, 0.38);
      background: rgba(45, 90, 61, 0.06);
      outline: none;
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 22px, 920px);
        padding-top: 18px;
      }

      .topbar {
        display: grid;
        align-items: start;
      }

      .counter {
        width: 100%;
        text-align: center;
      }

      .question-card {
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">Flashcarduri Bac Română</h1>
      <div class="counter"><span id="questionCount">0</span> întrebări</div>
    </header>

    <nav class="tabs" aria-label="Navigare">
      <button class="tab-button active" id="randomTabButton" type="button" aria-controls="randomPanel">Aleatorie</button>
      <button class="tab-button" id="allTabButton" type="button" aria-controls="allPanel">Toate</button>
    </nav>

    <section class="panel active" id="randomPanel" aria-labelledby="randomTabButton">
      <article class="question-card">
        <p class="question-text" id="questionText"></p>
      </article>
      <button class="answer-button" id="answerButton" type="button">Răspuns</button>
      <div class="gallery" id="gallery" aria-live="polite"></div>
      <button class="random-button" id="randomButton" type="button" aria-label="Alege o întrebare aleatorie">↻</button>
    </section>

    <section class="panel" id="allPanel" aria-labelledby="allTabButton">
      <div class="works-list" id="worksList"></div>
    </section>
  </main>

  <script>
    const questions = [
      { text: "Cine este Mihai Eminescu în literatura română și ce reprezintă poemul romantic Luceafărul în opera sa?", opera: "Luceafărul", images: [] },
      { text: "Comentează două scene relevante pt romanul realist Ion de Liviu Rebreanu.", opera: "Ion", images: [] },
      { text: "Comentează două secvențe relevante din prima strofă și a doua strofă din poezia simbolistă Plumb de George Bacovia.", opera: "Plumb", images: [] },
      { text: "Care sunt două trăsături ale realismului de tip balzacian prezente în romanul Enigma Otiliei de George Călinescu?", opera: "Enigma Otiliei", images: [] },
      { text: "Care este conflictul principal din familia Moromete în primul volum al romanului Moromeții de Marin Preda?", opera: "Moromeții", images: [] },
      { text: "Explică pe scurt titlul poeziei moderniste Eu nu strivesc corola de minuni a lumii de Lucian Blaga.", opera: "Eu nu strivesc corola de minuni a lumii", images: [] },
      { text: "Comentează două scene relevante din comedia O scrisoare pierdută de I.L. Caragiale.", opera: "O scrisoare pierdută", images: [] },
      { text: "Care este tema operei în poemul Luceafărul de Mihai Eminescu?", opera: "Luceafărul", images: [] },
      { text: "Cum este construit imaginarul artistic în poezia Flori de mucigai de Tudor Arghezi?", opera: "Flori de mucigai", images: [] }
    ];

    const questionCount = document.querySelector("#questionCount");
    const questionText = document.querySelector("#questionText");
    const gallery = document.querySelector("#gallery");
    const answerButton = document.querySelector("#answerButton");
    const randomButton = document.querySelector("#randomButton");
    const randomTabButton = document.querySelector("#randomTabButton");
    const allTabButton = document.querySelector("#allTabButton");
    const randomPanel = document.querySelector("#randomPanel");
    const allPanel = document.querySelector("#allPanel");
    const worksList = document.querySelector("#worksList");

    let currentQuestionIndex = 0;

    questionCount.textContent = questions.length;

    function switchTab(tabName) {
      const showRandom = tabName === "random";

      randomTabButton.classList.toggle("active", showRandom);
      allTabButton.classList.toggle("active", !showRandom);
      randomPanel.classList.toggle("active", showRandom);
      allPanel.classList.toggle("active", !showRandom);
    }

    function hideGallery() {
      gallery.classList.remove("visible");
      gallery.replaceChildren();
    }

    function loadQuestion(index) {
      currentQuestionIndex = index;
      questionText.textContent = questions[currentQuestionIndex].text;
      hideGallery();
    }

    function showAnswer() {
      hideGallery();

      questions[currentQuestionIndex].images.forEach((src, imageIndex) => {
        const image = document.createElement("img");
        image.src = src;
        image.alt = `${questions[currentQuestionIndex].opera} - imagine ${imageIndex + 1}`;
        image.loading = "lazy";
        gallery.append(image);
      });

      if (gallery.children.length > 0) {
        gallery.classList.add("visible");
      }
    }

    function chooseRandomQuestion() {
      if (questions.length < 2) {
        loadQuestion(0);
        return;
      }

      let nextIndex = currentQuestionIndex;
      while (nextIndex === currentQuestionIndex) {
        nextIndex = Math.floor(Math.random() * questions.length);
      }

      loadQuestion(nextIndex);
    }

    function createAllQuestionsView() {
      const groupedQuestions = questions.reduce((groups, question, index) => {
        if (!groups.has(question.opera)) {
          groups.set(question.opera, []);
        }

        groups.get(question.opera).push({ question, index });
        return groups;
      }, new Map());

      groupedQuestions.forEach((items, opera) => {
        const block = document.createElement("section");
        block.className = "work-block";

        const workButton = document.createElement("button");
        workButton.className = "work-button";
        workButton.type = "button";
        workButton.textContent = opera;

        const list = document.createElement("ul");
        list.className = "question-list";

        items.forEach(({ question, index }) => {
          const item = document.createElement("li");
          const questionButton = document.createElement("button");

          questionButton.className = "question-link";
          questionButton.type = "button";
          questionButton.textContent = question.text;
          questionButton.addEventListener("click", () => {
            loadQuestion(index);
            switchTab("random");
          });

          item.append(questionButton);
          list.append(item);
        });

        workButton.addEventListener("click", () => {
          block.classList.toggle("open");
        });

        block.append(workButton, list);
        worksList.append(block);
      });
    }

    randomTabButton.addEventListener("click", () => switchTab("random"));
    allTabButton.addEventListener("click", () => switchTab("all"));
    answerButton.addEventListener("click", showAnswer);
    randomButton.addEventListener("click", chooseRandomQuestion);

    createAllQuestionsView();
    loadQuestion(0);
  </script>
</body>
</html>
